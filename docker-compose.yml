version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: performance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: performance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: performance_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  server:
    build:
      context: ./server
    container_name: performance_api
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=performance_db;Username=postgres;Password=password
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db

  client:
    build:
      context: ./client
    container_name: performance_web
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
    depends_on:
      - server

volumes:
  pgdata:
